<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Finance Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
text-align:center;
padding:40px;
}

canvas{
max-width:400px;
margin:auto;
}

.card{
background:#020617;
padding:20px;
border-radius:10px;
margin:20px auto;
width:300px;
}

</style>
</head>

<body>

<h1>Finance Dashboard</h1>

<div class="card">
<h3>Total Dana</h3>
<h2 id="total">Loading...</h2>
</div>

<canvas id="chart"></canvas>

<script>

async function loadChart(){

const res = await fetch(
"https://finance-worker.ebeneserpinem6.workers.dev/api/data"
);

const data = await res.json();

document.getElementById("total").innerText =
"Rp "+data.total.toLocaleString("id-ID");

const ctx=document.getElementById("chart");

new Chart(ctx,{
type:"pie",
data:{
labels:["Dana Darurat","Investasi"],
datasets:[{
data:[
data.dana_darurat,
data.investasi
]
}]
}
});

}

loadChart();

</script>

</body>
</html>
