<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Finance Dashboard Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --border: #334155; --primary: #38bdf8; --success: #22c55e; --danger: #ef4444; --text: #f8fafc; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; }
        .container { max-width: 1200px; margin: auto; }
        .card { background: var(--card); padding: 20px; border-radius: 12px; border: 1px solid var(--border); margin-bottom: 20px; }
        .grid3 { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 15px; }
        .grid-split { display: grid; grid-template-columns: 1.2fr 1.8fr; gap: 20px; }
        @media (max-width: 850px) { .grid-split { grid-template-columns: 1fr; } }
        input, select { width: 100%; padding: 10px; margin: 8px 0; border-radius: 8px; border: 1px solid var(--border); background: #0f172a; color: white; box-sizing: border-box; }
        .big-val { font-size: 1.8em; font-weight: 800; margin-top: 5px; }
        .c-asset { color: var(--success); } .c-expense { color: var(--danger); } .c-net { color: var(--primary); }
        table { width: 100%; border-collapse: collapse; font-size: 13px; }
        th, td { padding: 12px; border-bottom: 1px solid var(--border); text-align: left; }
        button { background: var(--primary); border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; color: white; font-weight: bold; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h2 style="margin:0">Dashboard Aset</h2>
        <div style="display:flex; gap:10px;">
            <select id="filterBulan" onchange="refresh()" style="margin:0; width:200px;">
                <option value="">Semua Waktu (Lihat Data Lama)</option>
            </select>
            <button onclick="location.reload()" style="background:#475569">Refresh</button>
        </div>
    </div>

    <div class="card">
        <div class="grid3" style="align-items: end;">
            <div><label>Kategori</label>
                <select id="f-kat">
                    <option value="pemasukan">Pemasukan (Uang Masuk)</option>
                    <option value="pengeluaran">Pengeluaran</option>
                    <option value="investasi">Investasi</option>
                    <option value="dana_darurat">Dana Darurat</option>
                </select>
            </div>
            <div><label>Deskripsi</label><input type="text" id="f-desc" placeholder="Keterangan"></div>
            <div><label>Nominal</label><input type="number" id="f-amt" placeholder="0"></div>
            <button onclick="simpan()" style="background:var(--success); width:100%; height:42px;">Simpan</button>
        </div>
    </div>

    <div class="grid3">
        <div class="card">Total Aset (A+B)<div id="v-asset" class="big-val c-asset">Rp 0</div></div>
        <div class="card">Pengeluaran<div id="v-exp" class="big-val c-expense">Rp 0</div></div>
        <div class="card">Saldo Bersih<div id="v-net" class="big-val c-net">Rp 0</div></div>
    </div>

    <div class="card">
        <h3>Tren Pertumbuhan Aset (6 Bulan Terakhir)</h3>
        <canvas id="chartLinear" style="max-height: 250px;"></canvas>
    </div>

    <div class="grid-split">
        <div class="card" style="text-align: center;">
            <h3>Porsi Aset</h3>
            <canvas id="chartPie" style="max-height: 250px;"></canvas>
        </div>
        <div class="card">
            <h3>Riwayat Transaksi</h3>
            <div style="overflow-y: auto; max-height: 350px;">
                <table>
                    <thead><tr><th>Tanggal</th><th>Deskripsi</th><th style="text-align:right">Nominal</th><th>Aksi</th></tr></thead>
                    <tbody id="tableBody"></tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script>
    const API = "https://finance-worker.ebeneserpinem6.workers.dev";
    let pieChart, lineChart;

    function initFilter() {
        const select = document.getElementById('filterBulan');
        const now = new Date();
        for (let i = 0; i < 6; i++) {
            const d = new Date(now.getFullYear(), now.getMonth() - i, 1);
            const val = d.toISOString().slice(0, 7);
            const label = d.toLocaleDateString('id-ID', { month: 'long', year: 'numeric' });
            select.innerHTML += `<option value="${val}" ${i === 0 ? 'selected' : ''}>${label}</option>`;
        }
    }

    async function refresh() {
        const bulan = document.getElementById('filterBulan').value;
        const res = await fetch(`${API}/api/data?bulan=${bulan}`);
        const d = await res.json();
        
        document.getElementById("v-asset").innerText = "Rp " + d.totalAsset.toLocaleString('id-ID');
        document.getElementById("v-exp").innerText = "Rp " + d.pengeluaran.toLocaleString('id-ID');
        document.getElementById("v-net").innerText = "Rp " + d.saldoBersih.toLocaleString('id-ID');

        updateCharts(d);
        loadTable(bulan);
    }

    function updateCharts(data) {
        const ctxP = document.getElementById('chartPie');
        if(pieChart) pieChart.destroy();
        pieChart = new Chart(ctxP, {
            type: 'pie',
            data: {
                labels: ['Investasi', 'Dana Darurat'],
                datasets: [{ data: [data.investasi, data.dana_darurat], backgroundColor: ['#22c55e', '#38bdf8'] }]
            },
            options: { plugins: { legend: { position: 'bottom', labels: { color: 'white' } } } }
        });

        const ctxL = document.getElementById('chartLinear');
        if(lineChart) lineChart.destroy();
        lineChart = new Chart(ctxL, {
            type: 'line',
            data: {
                labels: data.trend.map(t => t.bln),
                datasets: [
                    { label: 'Investasi', data: data.trend.map(t => t.i), borderColor: '#22c55e', tension: 0.3 },
                    { label: 'Dana Darurat', data: data.trend.map(t => t.d), borderColor: '#38bdf8', tension: 0.3 }
                ]
            },
            options: { plugins: { legend: { labels: { color: 'white' } } }, scales: { y: { grid: { color: '#334155' }, ticks: { color: 'gray' } }, x: { ticks: { color: 'gray' } } } }
        });
    }

    async function loadTable(bulan) {
        const res = await fetch(`${API}/api/transaksi?bulan=${bulan}`);
        const list = await res.json();
        document.getElementById("tableBody").innerHTML = list.map(t => `
            <tr>
                <td>${new Date(t.tanggal).toLocaleDateString('id-ID')}</td>
                <td><b>${t.deskripsi}</b><br><small>${t.kategori}</small></td>
                <td style="text-align:right">Rp ${Number(t.jumlah).toLocaleString('id-ID')}</td>
                <td><button onclick="hapus('${t.id}')" style="background:var(--danger); padding:4px 8px; font-size:11px; border:none; color:white; border-radius:4px; cursor:pointer;">Hapus</button></td>
            </tr>
        `).join("");
    }

    async function simpan() {
        const payload = {
            deskripsi: document.getElementById('f-desc').value,
            jumlah: parseFloat(document.getElementById('f-amt').value),
            kategori: document.getElementById('f-kat').value
        };
        await fetch(`${API}/api/tambah`, { method: "POST", body: JSON.stringify(payload) });
        document.getElementById('f-desc').value = ""; document.getElementById('f-amt').value = "";
        refresh();
    }

    async function hapus(id) {
        if(confirm("Hapus?")) { await fetch(`${API}/api/hapus?id=${id}`, { method: "DELETE" }); refresh(); }
    }

    initFilter();
    refresh();
</script>
</body>
</html>
