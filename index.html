<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Finance Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
font-family:Arial;
max-width:900px;
margin:auto;
padding:20px;
background:#0f172a;
color:white;
}

.card{
background:#1e293b;
padding:20px;
border-radius:10px;
margin-bottom:20px;
}

h2{
color:#38bdf8;
}

table{
width:100%;
border-collapse:collapse;
}

th,td{
padding:10px;
border-bottom:1px solid #334155;
text-align:left;
}

button{
padding:10px 20px;
background:#38bdf8;
border:none;
border-radius:6px;
cursor:pointer;
}

</style>
</head>

<body>

<h2>💰 Finance Dashboard</h2>

<div class="card">

<h3>Pie Chart Keuangan</h3>

<canvas id="chart"></canvas>

</div>


<div class="card">

<h3>Daftar Transaksi</h3>

<table id="table">

<thead>
<tr>
<th>Tanggal</th>
<th>Deskripsi</th>
<th>Kategori</th>
<th>Jumlah</th>
</tr>
</thead>

<tbody></tbody>

</table>

</div>

<script>

const API="https://finance-worker.ebeneserpinem6.workers.dev";

let chart;


/***************************
AMBIL DATA CHART
***************************/
async function loadChart(){

const res=await fetch(API+"/api/data");

const data=await res.json();

const ctx=document.getElementById("chart");

if(chart) chart.destroy();

chart=new Chart(ctx,{
type:"pie",
data:{
labels:[
"Dana Darurat",
"Investasi",
"Pengeluaran"
],
datasets:[{
data:[
data.dana_darurat||0,
data.investasi||0,
data.pengeluaran||0
],
backgroundColor:[
"#facc15",
"#22c55e",
"#ef4444"
]
}]
}
});

}



/***************************
AMBIL LIST TRANSAKSI
***************************/
async function loadTransaksi(){

const res=await fetch(API+"/api/transaksi");

const data=await res.json();

const tbody=document.querySelector("#table tbody");

tbody.innerHTML="";

data.forEach(t=>{

const tr=document.createElement("tr");

tr.innerHTML=`

<td>${t.tanggal}</td>
<td>${t.deskripsi}</td>
<td>${t.kategori}</td>
<td>Rp ${Number(t.jumlah).toLocaleString()}</td>

`;

tbody.appendChild(tr);

});

}



/***************************
LOAD DATA
***************************/
function loadAll(){

loadChart();

loadTransaksi();

}

loadAll();


/***************************
AUTO REFRESH
***************************/
setInterval(loadAll,10000);

</script>

</body>
</html>
