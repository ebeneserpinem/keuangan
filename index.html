<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Finance Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/html2pdf.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

/* ===== GLOBAL ===== */

*{box-sizing:border-box}

body{
margin:0;
font-family:'Poppins',sans-serif;
background:linear-gradient(135deg,#020617,#020617,#0f172a,#020617);
color:white;
}

/* ===== LOGIN ===== */

#loginScreen{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.loginBox{
background:rgba(30,41,59,.7);
backdrop-filter:blur(20px);
padding:45px;
border-radius:20px;
width:340px;
text-align:center;
box-shadow:0 20px 60px rgba(0,0,0,.6);
animation:fade .6s ease;
}

@keyframes fade{
from{opacity:0;transform:translateY(20px)}
to{opacity:1}
}

input{
width:100%;
padding:12px;
margin-top:12px;
border-radius:10px;
border:none;
background:#020617;
color:white;
}

button{
background:linear-gradient(90deg,#38bdf8,#0ea5e9);
border:none;
padding:12px;
border-radius:10px;
cursor:pointer;
color:white;
font-weight:600;
margin-top:12px;
transition:.25s;
}

button:hover{
transform:translateY(-2px);
box-shadow:0 5px 20px rgba(56,189,248,.4);
}

/* ===== LAYOUT ===== */

#app{
display:none;
}

.container{
display:flex;
min-height:100vh;
}

/* SIDEBAR */

.sidebar{
width:240px;
background:rgba(2,6,23,.9);
padding:25px;
border-right:1px solid #1e293b;
}

.logo{
font-size:20px;
font-weight:600;
margin-bottom:30px;
color:#38bdf8;
}

.menu{
margin-top:20px;
}

.menu div{
padding:12px;
border-radius:10px;
cursor:pointer;
margin-bottom:10px;
transition:.2s;
}

.menu div:hover{
background:#1e293b;
}

/* CONTENT */

.content{
flex:1;
padding:30px;
}

.card{
background:rgba(30,41,59,.65);
backdrop-filter:blur(14px);
border:1px solid #334155;
border-radius:18px;
padding:22px;
margin-bottom:22px;
box-shadow:0 10px 30px rgba(0,0,0,.35);
animation:fade .4s ease;
}

/* STATS */

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
}

.stat{
font-size:13px;
opacity:.7;
}

.big{
font-size:26px;
font-weight:600;
margin-top:6px;
}

.net{color:#38bdf8}
.asset{color:#22c55e}
.expense{color:#ef4444}

/* TABLE */

table{
width:100%;
border-collapse:collapse;
}

th,td{
padding:12px;
border-bottom:1px solid #334155;
font-size:13px;
}

tr:hover{
background:rgba(255,255,255,.03);
}

/* FORM */

.formGrid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
gap:12px;
}

.nominal{
font-family:monospace;
font-weight:bold;
}

/* HEADER */

.topbar{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
}

.logout{
background:#ef4444;
}

canvas{
margin-top:15px;
}

</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginScreen">
<div class="loginBox">
<h2>🔐 Finance Login</h2>
<input type="password" id="password" placeholder="Password">
<button onclick="login()">Login</button>
<p id="error" style="color:#ef4444"></p>
</div>
</div>

<!-- APP -->
<div id="app">

<div class="container">

<div class="sidebar">
<div class="logo">💰 MyFinance</div>

<div class="menu">
<div>Dashboard</div>
<div onclick="downloadPDF()">Export PDF</div>
<div onclick="logout()">Logout</div>
</div>
</div>

<div class="content">

<div class="topbar">
<h2>Finance Overview</h2>
<span id="update"></span>
</div>

<!-- NET -->
<div class="card" style="text-align:center">
<div class="stat">Net Saldo</div>
<div class="big net" id="net">Rp 0</div>
</div>

<!-- STATS -->
<div class="grid">

<div class="card">
<div class="stat">Asset</div>
<div class="big asset" id="asset">Rp 0</div>
</div>

<div class="card">
<div class="stat">Dana Darurat</div>
<div class="big asset" id="darurat">Rp 0</div>
</div>

<div class="card">
<div class="stat">Investasi</div>
<div class="big asset" id="investasi">Rp 0</div>
</div>

<div class="card">
<div class="stat">Pengeluaran</div>
<div class="big expense" id="expense">Rp 0</div>
</div>

</div>

<!-- CHART -->
<div class="card">
<h3>Grafik Keuangan</h3>
<canvas id="chartLine"></canvas>
</div>

<!-- FORM -->
<div class="card">
<h3>Tambah Transaksi</h3>

<div class="formGrid">
<input id="f_kategori" placeholder="Kategori">
<input id="f_tujuan" placeholder="Tujuan">
<input id="f_jumlah" type="number" placeholder="Jumlah">
<input id="f_deskripsi" placeholder="Deskripsi">
</div>

<button onclick="tambahTransaksi()">Tambah</button>
</div>

<!-- TABLE -->
<div class="card">
<h3>Daftar Transaksi</h3>
<table>
<thead>
<tr>
<th>Tanggal</th>
<th>Kategori</th>
<th>Tujuan</th>
<th style="text-align:right">Jumlah</th>
</tr>
</thead>
<tbody id="table"></tbody>
</table>
</div>

</div>
</div>
</div>

<script>

const API="https://finance-worker.ebeneserpinem6.workers.dev"
const PASSWORD="123456"

let chart
let idleTimer
let loggedIn=false

/* LOGIN */

function login(){
if(password.value===PASSWORD){
loggedIn=true
loginScreen.style.display="none"
app.style.display="block"
refreshDashboard()
startIdle()
}else{
error.innerText="Password salah"
}
}

function logout(){
alert("Session berakhir")
location.reload()
}

/* AUTO LOGOUT */

function resetIdle(){
clearTimeout(idleTimer)
idleTimer=setTimeout(logout,180000)
}

function startIdle(){
["mousemove","click","keydown","scroll"]
.forEach(e=>document.addEventListener(e,resetIdle))
resetIdle()
}

/* DASHBOARD */

async function refreshDashboard(){

const d=await (await fetch(API+"/api/data")).json()

net.innerText="Rp "+d.saldo_net_display.toLocaleString('id-ID')
asset.innerText="Rp "+(d.dana_darurat+d.investasi).toLocaleString('id-ID')
darurat.innerText="Rp "+d.dana_darurat.toLocaleString('id-ID')
investasi.innerText="Rp "+d.investasi.toLocaleString('id-ID')
expense.innerText="Rp "+d.pengeluaran.toLocaleString('id-ID')

update.innerText="Update "+new Date().toLocaleTimeString()

const chartData=await (await fetch(API+"/api/chart")).json()

if(chart) chart.destroy()

chart=new Chart(chartLine,{
type:'line',
data:{
labels:chartData.bulan,
datasets:[
{label:'Asset',data:chartData.asset,borderColor:'#22c55e',tension:.3},
{label:'Pengeluaran',data:chartData.pengeluaran,borderColor:'#ef4444',tension:.3}
]
}
})

loadTransaksi()
}

/* TABLE */

async function loadTransaksi(){
const list=await (await fetch(API+"/api/transaksi")).json()

table.innerHTML=list.map(t=>{
const date=new Date(t.tanggal)
return `
<tr>
<td>${date.toLocaleDateString('id-ID')}</td>
<td>${t.kategori}</td>
<td>${t.tujuan ?? "-"}</td>
<td class="nominal" style="text-align:right">
Rp ${t.jumlah.toLocaleString('id-ID')}
</td>
</tr>`
}).join("")
}

/* TAMBAH */

async function tambahTransaksi(){

await fetch(API+"/api/transaksi",{
method:"POST",
headers:{'Content-Type':'application/json'},
body:JSON.stringify({
kategori:f_kategori.value,
tujuan:f_tujuan.value,
jumlah:Number(f_jumlah.value),
deskripsi:f_deskripsi.value
})
})

refreshDashboard()
}

/* PDF */

function downloadPDF(){
html2pdf().from(document.body).save("laporan_keuangan.pdf")
}

setInterval(refreshDashboard,10000)

</script>

</body>
</html>
