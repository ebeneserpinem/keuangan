<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Finance Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/html2pdf.js"></script>

<style>

body{
font-family:'Segoe UI',sans-serif;
background:#0f172a;
color:white;
max-width:1100px;
margin:auto;
padding:20px;
}

.card{
background:#1e293b;
padding:20px;
border-radius:14px;
border:1px solid #334155;
margin-bottom:20px;
}

.grid4{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:15px;
}

.gridChart{
display:grid;
grid-template-columns:2fr 1fr;
gap:20px;
}

.big{
font-size:1.8em;
font-weight:bold;
margin-top:8px;
}

.net{color:#38bdf8}
.asset{color:#22c55e}
.expense{color:#ef4444}

canvas{
max-height:240px;
}

table{
width:100%;
border-collapse:collapse;
font-size:13px;
}

th,td{
padding:10px;
border-bottom:1px solid #334155;
}

.nominal{
text-align:right;
font-family:monospace;
font-weight:bold;
}

.qris{color:#22c55e}
.transfer{color:#38bdf8}

button{
background:#38bdf8;
border:none;
padding:6px 10px;
border-radius:6px;
cursor:pointer;
color:white;
}

</style>
</head>

<body>

<!-- NET -->
<div class="card" style="text-align:center">
<h2>Net Saldo</h2>
<div id="net" class="big net">Rp 0</div>
</div>

<!-- TOTAL -->
<div class="grid4">

<div class="card">
Dana Darurat
<div id="darurat" class="big asset">Rp 0</div>
</div>

<div class="card">
Investasi
<div id="investasi" class="big asset">Rp 0</div>
</div>

<div class="card">
Pengeluaran
<div id="expense" class="big expense">Rp 0</div>
</div>

<div class="card">
Total Asset
<div id="asset" class="big asset">Rp 0</div>
</div>

</div>

<!-- CHART -->
<div class="gridChart">

<div class="card">
<h3>Grafik Keuangan</h3>
<canvas id="chartLine"></canvas>
</div>

<div class="card">
<h3>Komposisi Asset</h3>
<canvas id="chartPie"></canvas>
</div>

</div>

<!-- TRANSAKSI -->
<div class="card">

<h3>Daftar Transaksi</h3>

<button onclick="downloadPDF()">Download PDF</button>

<table>
<thead>
<tr>
<th>Tanggal</th>
<th>Waktu</th>
<th>Kategori</th>
<th>Metode</th>
<th>Tujuan</th>
<th class="nominal">Nominal</th>
<th>Aksi</th>
</tr>
</thead>

<tbody id="table"></tbody>

</table>

</div>

<script>

const API="https://finance-worker.ebeneserpinem6.workers.dev"

let chart
let pieChart

async function refreshDashboard(){

try{

/* ========= SUMMARY ========= */

const res=await fetch(API+"/api/data")
const d=await res.json()

const asset=d.dana_darurat+d.investasi

document.getElementById("net").innerText=
"Rp "+d.saldo_net_display.toLocaleString('id-ID')

document.getElementById("darurat").innerText=
"Rp "+d.dana_darurat.toLocaleString('id-ID')

document.getElementById("investasi").innerText=
"Rp "+d.investasi.toLocaleString('id-ID')

document.getElementById("expense").innerText=
"Rp "+d.pengeluaran.toLocaleString('id-ID')

document.getElementById("asset").innerText=
"Rp "+asset.toLocaleString('id-ID')


/* ========= LINE CHART ========= */

const chartRes=await fetch(API+"/api/chart")
const data=await chartRes.json()

const ctx=document.getElementById("chartLine")

if(chart) chart.destroy()

chart=new Chart(ctx,{
type:'line',
data:{
labels:data.bulan,
datasets:[
{
label:'Asset',
data:data.asset,
borderColor:'#22c55e',
tension:0.3
},
{
label:'Pengeluaran',
data:data.pengeluaran,
borderColor:'#ef4444',
tension:0.3
}
]
},
options:{
plugins:{legend:{labels:{color:'white'}}},
scales:{
x:{ticks:{color:'white'}},
y:{ticks:{color:'white'}}
}
}
})

/* ========= PIE CHART ========= */

const pie=document.getElementById("chartPie")

if(pieChart) pieChart.destroy()

pieChart=new Chart(pie,{
type:'pie',
data:{
labels:["Dana Darurat","Investasi"],
datasets:[{
data:[d.dana_darurat,d.investasi],
backgroundColor:["#22c55e","#38bdf8"]
}]
},
options:{
plugins:{legend:{labels:{color:'white'}}}
}
})

/* ========= TRANSAKSI ========= */

const resTable=await fetch(API+"/api/transaksi")
const list=await resTable.json()

const tbody=document.getElementById("table")

tbody.innerHTML=list.map(t=>{

const date=new Date(t.tanggal)

const tanggal=date.toLocaleDateString('id-ID',{
day:'2-digit',
month:'2-digit'
})

const waktu=date.toLocaleTimeString('id-ID',{
hour:'2-digit',
minute:'2-digit'
})

let metode="Transfer"
if(t.deskripsi &&
t.deskripsi.toLowerCase().includes("qris")){
metode="QRIS"
}

return `
<tr>
<td>${tanggal}</td>
<td>${waktu}</td>
<td>${t.kategori}</td>
<td class="${metode=="QRIS"?"qris":"transfer"}">${metode}</td>
<td>${t.tujuan ?? "-"}</td>
<td class="nominal">
Rp ${Number(t.jumlah).toLocaleString('id-ID')}
</td>
<td>
<button onclick="hapus('${t.id}')">Hapus</button>
</td>
</tr>
`

}).join("")

}catch(e){
console.log("error",e)
}

}

/* ========= HAPUS ========= */

async function hapus(id){

if(!confirm("Hapus transaksi?")) return

await fetch(API+"/api/hapus?id="+id,{
method:"DELETE"
})

refreshDashboard()
}

/* ========= PDF ========= */

function downloadPDF(){

html2pdf().set({
margin:10,
filename:'laporan_keuangan.pdf',
html2canvas:{scale:2},
jsPDF:{unit:'mm',format:'a4'}
}).from(document.body).save()

}

refreshDashboard()
setInterval(refreshDashboard,10000)

</script>

</body>
</html>
