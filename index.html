<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Sentinel Finance</title>

<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
:root{
 --brand:#6366f1;
 --success:#10b981;
 --danger:#f43f5e;
 --bg:#0b0f1a;
 --card:rgba(23,28,48,.7);
 --border:rgba(255,255,255,.08);
 --text:#f8fafc;
 --muted:#94a3b8;
}

*{box-sizing:border-box;margin:0;padding:0}
body{
font-family:'Plus Jakarta Sans',sans-serif;
background:var(--bg);
color:var(--text);
padding:30px;
}

.card{
background:var(--card);
border:1px solid var(--border);
border-radius:20px;
padding:25px;
margin-bottom:20px;
backdrop-filter:blur(12px);
}

.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:20px}

.value{font-size:28px;font-weight:800}

input,select{
background:#111827;
border:1px solid var(--border);
padding:12px;
border-radius:10px;
color:white;
}

button{
background:var(--brand);
border:none;
padding:12px;
border-radius:10px;
color:white;
font-weight:700;
cursor:pointer;
}

table{width:100%;border-collapse:collapse}
th,td{padding:14px;border-bottom:1px solid var(--border)}
th{color:var(--muted);font-size:12px;text-align:left}

.smallChart{height:180px}
</style>
</head>

<body>

<div id="login">
<div class="card" style="max-width:320px;margin:auto;text-align:center">
<h2>Sentinel Login</h2>
<input type="password" id="pass" placeholder="Password">
<br><br>
<button onclick="login()">LOGIN</button>
</div>
</div>

<div id="app" style="display:none">

<div class="grid">
<div class="card">
<div>Total Aset</div>
<div id="asset" class="value">Rp 0</div>
</div>

<div class="card">
<div>Pengeluaran</div>
<div id="exp" class="value" style="color:var(--danger)">Rp 0</div>
</div>

<div class="card">
<div>Saldo Bersih</div>
<div id="net" class="value" style="color:var(--brand)">Rp 0</div>
</div>
</div>

<div class="grid">

<div class="card">
<h4>Progress Dana Darurat</h4>
<canvas id="pie"></canvas>
</div>

<div class="card smallChart">
<h4>Tren Saldo</h4>
<canvas id="line"></canvas>
</div>

</div>

<div class="card">
<h4>Tambah Transaksi</h4>

<select id="kat">
<option value="pemasukan">Pemasukan</option>
<option value="pengeluaran">Pengeluaran</option>
<option value="dana_darurat">Dana Darurat</option>
</select>

<input id="desc" placeholder="Keterangan">
<input id="amt" type="number" placeholder="Nominal">

<button onclick="tambah()">Simpan</button>
</div>

<div class="card">
<select id="bulan" onchange="render()">
<option value="all">SEMUA BULAN</option>
</select>

<table>
<thead>
<tr>
<th>Tanggal</th>
<th>Kategori</th>
<th>Deskripsi</th>
<th>Nominal</th>
<th></th>
</tr>
</thead>
<tbody id="tbody"></tbody>
</table>
</div>

</div>

<script>
const API="https://finance-worker.ebeneserpinem6.workers.dev";

let dataRaw=[];
let pie,line;
let idleTimer;

/* ================= LOGIN ================= */

function login(){
if(pass.value==="12345"){
document.getElementById('login').style.display='none';
app.style.display='block';
startIdle();
load();
}else alert("Password salah");
}

/* ===== AUTO LOGOUT 3 MENIT ===== */

function startIdle(){
resetIdle();
['click','mousemove','keydown'].forEach(e=>{
document.addEventListener(e,resetIdle);
});
}

function resetIdle(){
clearTimeout(idleTimer);
idleTimer=setTimeout(()=>location.reload(),180000);
}

/* ================= LOAD ================= */

async function load(){
const res=await fetch(API+"/api/transaksi");
dataRaw=await res.json();

buildMonth();
render();
updateSummary();
}

/* ================= SUMMARY ================= */

function updateSummary(){

let asset=0,exp=0;

dataRaw.forEach(t=>{
if(t.kategori==="pengeluaran") exp+=Number(t.jumlah);
else asset+=Number(t.jumlah);
});

assetEl(asset);
assetEl(exp,'exp');
assetEl(asset-exp,'net');

updateCharts();
}

function assetEl(val,id="asset"){
document.getElementById(id).innerText=
"Rp "+val.toLocaleString('id-ID');
}

/* ================= CHART ================= */

function updateCharts(){

/* ==== PIE TARGET DANA DARURAT ==== */

const dana=dataRaw
.filter(t=>t.kategori==="dana_darurat")
.reduce((a,b)=>a+Number(b.jumlah),0);

const TARGET=30000000;
const sisa=Math.max(TARGET-dana,0);

if(pie) pie.destroy();

pie=new Chart(pieCanvas,{
type:'pie',
data:{
labels:['Terkumpul','Sisa Target'],
datasets:[{data:[dana,sisa]}]
}
});

/* ==== LINE ==== */

let bal=0;
const sorted=[...dataRaw].sort((a,b)=>new Date(a.tanggal)-new Date(b.tanggal));

const pts=sorted.map(t=>{
bal+=t.kategori==="pengeluaran"?-t.jumlah:t.jumlah;
return bal;
});

if(line) line.destroy();

line=new Chart(lineCanvas,{
type:'line',
data:{labels:pts.map(()=>''),datasets:[{data:pts}]},
options:{plugins:{legend:{display:false}},scales:{x:{display:false},y:{display:false}}}
});
}

/* ================= BULAN ================= */

function buildMonth(){
const set=new Set();

dataRaw.forEach(t=>{
const d=new Date(t.tanggal);
set.add(d.getFullYear()+"-"+(d.getMonth()+1));
});

bulan.innerHTML='<option value="all">SEMUA BULAN</option>';

[...set].sort().reverse().forEach(m=>{
bulan.innerHTML+=`<option value="${m}">${m}</option>`;
});
}

/* ================= TABLE ================= */

function render(){

const f=bulan.value;

const list=dataRaw.filter(t=>{
if(f==="all") return true;
const d=new Date(t.tanggal);
return d.getFullYear()+"-"+(d.getMonth()+1)===f;
});

tbody.innerHTML=list.map(t=>`
<tr>
<td>${new Date(t.tanggal).toLocaleDateString()}</td>
<td>${t.kategori}</td>
<td>${t.deskripsi}</td>
<td>Rp ${Number(t.jumlah).toLocaleString('id-ID')}</td>
<td><button onclick="hapus('${t.id}')">X</button></td>
</tr>
`).join('');
}

/* ================= TAMBAH ================= */

async function tambah(){
await fetch(API+"/api/tambah",{
method:"POST",
body:JSON.stringify({
deskripsi:desc.value,
jumlah:Number(amt.value),
kategori:kat.value,
email_id:"user@mail.com"
})
});

desc.value="";
amt.value="";
load();
}

/* ================= HAPUS ================= */

async function hapus(id){
if(!confirm("Hapus transaksi?"))return;

await fetch(API+"/api/hapus?id="+id,{method:"DELETE"});
load();
}

</script>
</body>
</html>
