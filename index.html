<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Finance Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
background:#0f172a;
color:white;
font-family:sans-serif;
padding:30px;
}

.card{
background:#1e293b;
padding:20px;
border-radius:12px;
margin-bottom:20px;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
}

table{
width:100%;
border-collapse:collapse;
}

td,th{
padding:10px;
border-bottom:1px solid #334155;
}

</style>
</head>

<body>

<h2>💰 Finance Dashboard</h2>

<div class="card">
<h3>Saldo Net</h3>
<h1 id="saldoNet">Rp 0</h1>
</div>

<div class="card">
<h3>Total Aset</h3>
<h1 id="totalAset">Rp 0</h1>
</div>

<div class="grid">

<div class="card">

<h3>📊 Alokasi Dana</h3>

<canvas id="pieChart"></canvas>

</div>

<div class="card">

<h3>📄 Log Transaksi</h3>

<table>

<thead>
<tr>
<th>Tanggal</th>
<th>Kategori</th>
<th>Jumlah</th>
</tr>
</thead>

<tbody id="listTransaksi"></tbody>

</table>

</div>

</div>

<script>

const WORKER_URL="https://finance-worker.ebeneserpinem6.workers.dev";

let chart;

// ====================
// FORMAT RUPIAH
// ====================

function rupiah(num){
return "Rp "+num.toLocaleString("id-ID");
}

// ====================
// LOAD DASHBOARD
// ====================

async function loadDashboard(){

const res=await fetch(WORKER_URL+"/api/data");
const data=await res.json();

document.getElementById("saldoNet").innerText=rupiah(data.saldo_net);
document.getElementById("totalAset").innerText=rupiah(data.total_aset);

drawChart(data);

}

// ====================
// PIE CHART
// ====================

function drawChart(data){

const ctx=document.getElementById("pieChart");

if(chart) chart.destroy();

chart=new Chart(ctx,{

type:"pie",

data:{
labels:["Dana Darurat","Investasi"],

datasets:[{
data:[
data.dana_darurat,
data.investasi
],

backgroundColor:[
"#facc15",
"#22c55e"
]

}]

}

});

}

// ====================
// LIST TRANSAKSI
// ====================

async function loadTransaksi(){

const res=await fetch(WORKER_URL+"/api/transaksi");
const data=await res.json();

const tbody=document.getElementById("listTransaksi");

tbody.innerHTML="";

data.forEach(t=>{

tbody.innerHTML+=`

<tr>
<td>${t.tanggal}</td>
<td>${t.kategori.toUpperCase()}</td>
<td>${rupiah(t.jumlah)}</td>
</tr>

`;

});

}

// ====================
// INIT
// ====================

loadDashboard();
loadTransaksi();

</script>

</body>
</html>
