<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finance Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        /* TAMPILAN ASLI ANDA */
        body { font-family: sans-serif; background: #0f172a; color: white; padding: 20px; max-width: 800px; margin: auto; }
        .card { background: #1e293b; padding: 20px; border-radius: 12px; margin-bottom: 20px; text-align: center; border: 1px solid #334155; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .val { color: #38bdf8; font-size: 2.2em; font-weight: bold; margin: 10px 0; }
        table { width: 100%; border-collapse: collapse; font-size: 0.8em; margin-top: 10px; }
        th, td { padding: 8px; border-bottom: 1px solid #334155; text-align: left; }
        @media (max-width: 600px) { .grid { grid-template-columns: 1fr; } }

        /* Tambahan sedikit agar input rapi di dalam tema asli */
        input, select, button { 
            background: #0f172a; color: white; border: 1px solid #334155; 
            padding: 5px; border-radius: 4px; font-size: 0.8em;
        }
        button { cursor: pointer; background: #38bdf8; color: #0f172a; font-weight: bold; }
        .btn-del { background: none; border: none; color: #ef4444; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <!-- SALDO -->
    <div class="card">
        <h3>💰 Saldo Net Saat Ini</h3>
        <div class="val" id="saldo-net">Rp 0</div>
        
        <!-- FORM TAMBAH (Diselipkan di card saldo agar UI tetap bersih) -->
        <div style="margin-top: 15px; display: flex; gap: 5px; justify-content: center; flex-wrap: wrap;">
            <input type="text" id="desc" placeholder="Ket" style="width: 80px;">
            <input type="number" id="amount" placeholder="Rp" style="width: 80px;">
            <select id="cat">
                <option value="saldo_net">Masuk</option>
                <option value="pengeluaran">Keluar</option>
                <option value="investasi">Investasi</option>
                <option value="dana_darurat">Darurat</option>
            </select>
            <button onclick="tambah()">+</button>
        </div>
    </div>

    <div class="grid">
        <!-- CHART -->
        <div class="card">
            <h4>📊 Alokasi Dana</h4>
            <canvas id="chart"></canvas>
        </div>

        <!-- TABEL RIWAYAT -->
        <div class="card">
            <h4>📝 Riwayat</h4>
            <table id="table">
                <thead>
                    <tr>
                        <th>Kategori</th>
                        <th>Jumlah</th>
                        <th></th> 
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>
    </div>

    <script>
        const API = "https://finance-worker.ebeneserpinem6.workers.dev";
        let chartObj;

        // FUNGSI LOAD DATA
        async function load() {
            const r = await fetch(API + "/api/data");
            const d = await r.json();
            document.getElementById("saldo-net").innerText = "Rp " + d.saldo_net_display.toLocaleString('id-ID');
            
            const ctx = document.getElementById("chart").getContext("2d");
            if(chartObj) chartObj.destroy();
            chartObj = new Chart(ctx, {
                type: 'pie',
                data: {
                    labels: ['Darurat', 'Investasi', 'Keluar'],
                    datasets: [{ 
                        data: [d.dana_darurat, d.investasi, d.pengeluaran], 
                        backgroundColor: ['#facc15', '#22c55e', '#ef4444'] 
                    }]
                },
                options: { plugins: { legend: { display: false } } } // Agar ringkas
            });

            const rT = await fetch(API + "/api/transaksi");
            const list = await rT.json();
            // Menampilkan kategori, jumlah, dan tombol hapus (X)
            document.querySelector("#table tbody").innerHTML = list.map(t => `
                <tr>
                    <td>${t.kategori}</td>
                    <td>Rp ${t.jumlah.toLocaleString('id-ID')}</td>
                    <td><button class="btn-del" onclick="hapus(${t.id})">✕</button></td>
                </tr>
            `).join("");
        }

        // FUNGSI TAMBAH DATA
        async function tambah() {
            const desc = document.getElementById("desc").value;
            const amount = document.getElementById("amount").value;
            const cat = document.getElementById("cat").value;

            if(!amount) return alert("Isi jumlah!");

            await fetch(API, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    tanggal: new Date().toISOString().split('T')[0],
                    deskripsi: desc || "Manual",
                    jumlah: parseInt(amount),
                    kategori: cat,
                    email_id: "user@test.com",
                    no_rekening: "123"
                })
            });

            document.getElementById("amount").value = "";
            document.getElementById("desc").value = "";
            load();
        }

        // FUNGSI HAPUS DATA
        async function hapus(id) {
            if(confirm("Hapus transaksi ini?")) {
                await fetch(`${API}?id=${id}`, { method: "DELETE" });
                load();
            }
        }

        load(); 
        setInterval(load, 30000); // Refresh tiap 30 detik saja agar tidak berat saat mengetik
    </script>
</body>
</html>
