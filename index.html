<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Finance Asset Pro - Managed</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        :root { 
            --bg: #0b0f1a; --card: rgba(30, 41, 59, 0.7); --border: #334155; 
            --primary: #38bdf8; --success: #22c55e; --danger: #ef4444; --text: #f8fafc; 
            --glow: rgba(56, 189, 248, 0.15);
        }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; line-height: 1.6; }
        .container { max-width: 1200px; margin: auto; }
        .card { 
            background: var(--card); padding: 20px; border-radius: 16px; 
            border: 1px solid var(--border); margin-bottom: 20px;
            backdrop-filter: blur(12px); transition: all 0.3s;
        }
        .card:hover { border-color: var(--primary); box-shadow: 0 8px 30px var(--glow); }
        .grid3 { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 15px; }
        .grid-charts { display: grid; grid-template-columns: 1.2fr 1.8fr; gap: 20px; margin-bottom: 20px; }
        @media (max-width: 850px) { .grid-charts { grid-template-columns: 1fr; } }
        input, select { 
            width: 100%; padding: 12px; margin: 8px 0; border-radius: 10px; 
            border: 1px solid var(--border); background: #0f172a; color: white; box-sizing: border-box;
        }
        .big-val { font-size: 2em; font-weight: 800; margin-top: 5px; }
        .c-asset { color: var(--success); }
        .c-expense { color: var(--danger); }
        .c-net { color: var(--primary); }
        table { width: 100%; border-collapse: collapse; font-size: 14px; }
        th, td { padding: 12px; border-bottom: 1px solid var(--border); text-align: left; }
        .nominal { text-align: right; font-family: monospace; font-weight: bold; }
        button { 
            background: var(--primary); border: none; padding: 12px 24px; 
            border-radius: 10px; cursor: pointer; color: white; font-weight: bold;
        }
        button:disabled { background: #475569; cursor: not-allowed; }
        .btn-del { background: transparent; color: var(--danger); border: 1px solid var(--danger); padding: 4px 8px; }
        #login-screen { position: fixed; inset: 0; background: var(--bg); display: flex; align-items: center; justify-content: center; z-index: 10000; }
        .chart-container { position: relative; width: 100%; max-height: 250px; }
        .chart-text { position: absolute; top: 55%; left: 50%; transform: translate(-50%, -50%); text-align: center; }
    </style>
</head>
<body>

<div id="login-screen">
    <div class="card" style="width: 320px; text-align: center;">
        <h2 style="color: var(--primary)">Vault Access</h2>
        <input type="password" id="passInput" placeholder="••••••••" style="text-align: center;">
        <button onclick="login()" style="width: 100%; margin-top: 15px;">UNLOCK</button>
    </div>
</div>

<div id="main-content" class="container" style="display: none;">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 25px;">
        <h2 style="margin:0;">Finance<span style="color:var(--primary)">Asset</span></h2>
        <button onclick="logout()" style="background:rgba(239, 68, 68, 0.2); color: var(--danger);">Logout</button>
    </div>

    <div class="grid3">
        <div class="card"><small>Total Aset</small><div id="v-asset" class="big-val c-asset">Rp 0</div></div>
        <div class="card"><small>Pengeluaran</small><div id="v-exp" class="big-val c-expense">Rp 0</div></div>
        <div class="card"><small>Net Balance</small><div id="v-net" class="big-val c-net">Rp 0</div></div>
    </div>

    <div class="card">
        <div class="grid3" style="align-items: end;">
            <div><label>Kategori</label>
                <select id="f-kat">
                    <option value="pemasukan">📥 Pemasukan (Cash In)</option>
                    <option value="pengeluaran">📤 Pengeluaran</option>
                    <option value="investasi">📈 Investasi</option>
                    <option value="dana_darurat">🛡️ Dana Darurat</option>
                </select>
            </div>
            <div><label>Deskripsi</label><input type="text" id="f-desc" placeholder="Gaji / Makan"></div>
            <div><label>Nominal</label><input type="number" id="f-amt" placeholder="0"></div>
            <button id="btnSimpan" onclick="simpan()" style="background:var(--success); width: 100%;">SIMPAN DATA</button>
        </div>
    </div>

    <div class="grid-charts">
        <div class="card">
            <h3 style="font-size: 14px; text-align: center;">Progress Dana Darurat</h3>
            <div class="chart-container">
                <canvas id="chartPie"></canvas>
                <div class="chart-text">
                    <div id="chart-percent" style="font-size: 24px; font-weight: 800; color: var(--primary);">0%</div>
                </div>
            </div>
        </div>
        <div class="card">
            <h3 style="font-size: 14px;">Growth Analytics</h3>
            <canvas id="chartLine" style="max-height: 200px;"></canvas>
        </div>
    </div>

    <div class="card" style="overflow-x: auto;">
        <h3>Transaction Log</h3>
        <table>
            <thead>
                <tr><th>Date</th><th>Kategori</th><th>Deskripsi</th><th class="nominal">Amount</th><th>Action</th></tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>
</div>

<script>
    // GANTI URL INI DENGAN URL WORKER ANDA
    const API = "https://finance-worker.ebeneserpinem6.workers.dev";
    const TARGET_DANA_DARURAT = 10000000; 
    let myPieChart, myLineChart;

    function login() {
        if(document.getElementById('passInput').value === "12345") {
            localStorage.setItem("session", "valid");
            checkAuth();
        } else { alert("Wrong Password!"); }
    }
    function logout() { localStorage.removeItem("session"); location.reload(); }
    
    function checkAuth() {
        if(localStorage.getItem("session")) {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('main-content').style.display = 'block';
            refresh();
        }
    }

    async function refresh() {
        try {
            const res = await fetch(API + "/api/data");
            const d = await res.json();
            
            document.getElementById("v-asset").innerText = "Rp " + d.totalAsset.toLocaleString('id-ID');
            document.getElementById("v-exp").innerText = "Rp " + d.pengeluaran.toLocaleString('id-ID');
            document.getElementById("v-net").innerText = "Rp " + d.saldoBersih.toLocaleString('id-ID');

            updatePieChart(d.dana_darurat);
            await loadTable();
        } catch (e) { console.error("Refresh Error:", e); }
    }

    async function loadTable() {
        const res = await fetch(API + "/api/transaksi");
        const list = await res.json();
        
        document.getElementById("tableBody").innerHTML = list.map(t => `
            <tr>
                <td>${new Date(t.tanggal).toLocaleDateString('id-ID')}</td>
                <td><small>${t.kategori.toUpperCase()}</small></td>
                <td><b>${t.deskripsi}</b></td>
                <td class="nominal" style="color:${t.kategori === 'pengeluaran' ? 'var(--danger)' : 'var(--success)'}">
                    Rp ${Number(t.jumlah).toLocaleString('id-ID')}
                </td>
                <td><button class="btn-del" onclick="hapus('${t.id}')">Hapus</button></td>
            </tr>
        `).join("");

        updateLineChart(list);
    }

    async function simpan() {
        const desc = document.getElementById('f-desc').value;
        const amt = document.getElementById('f-amt').value;
        const kat = document.getElementById('f-kat').value;
        const btn = document.getElementById('btnSimpan');

        if(!desc || !amt) return alert("Lengkapi data!");

        btn.disabled = true;
        btn.innerText = "Saving...";

        try {
            const response = await fetch(API + "/api/tambah", { 
                method: "POST", 
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ deskripsi: desc, jumlah: parseFloat(amt), kategori: kat }) 
            });

            if(response.ok) {
                document.getElementById('f-desc').value = ""; 
                document.getElementById('f-amt').value = "";
                await refresh();
            }
        } catch (e) { 
            alert("Gagal simpan data");
        } finally {
            btn.disabled = false;
            btn.innerText = "SIMPAN DATA";
        }
    }

    async function hapus(id) {
        if(confirm("Hapus data ini?")) {
            await fetch(`${API}/api/hapus?id=${id}`, { method: "DELETE" });
            refresh();
        }
    }

    function updatePieChart(darurat) {
        const ctx = document.getElementById('chartPie');
        if(myPieChart) myPieChart.destroy();
        
        const sisa = Math.max(0, TARGET_DANA_DARURAT - darurat);
        const persentase = Math.min(100, Math.round((darurat / TARGET_DANA_DARURAT) * 100));
        document.getElementById('chart-percent').innerText = persentase + "%";

        myPieChart = new Chart(ctx, {
            type: 'doughnut',
            data: {
                labels: ['Terkumpul', 'Sisa'],
                datasets: [{
                    data: [darurat, sisa],
                    backgroundColor: ['#38bdf8', '#1e293b'],
                    borderWidth: 0
                }]
            },
            options: { cutout: '80%', plugins: { legend: { display: false } } }
        });
    }

    function updateLineChart(data) {
        const ctx = document.getElementById('chartLine');
        if(myLineChart) myLineChart.destroy();
        
        const sorted = [...data].reverse();
        let current = 0;
        const dataPoints = sorted.map(t => {
            current += (t.kategori === 'pengeluaran' ? -t.jumlah : t.jumlah);
            return current;
        });

        myLineChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: sorted.map(t => new Date(t.tanggal).toLocaleDateString('id-ID')),
                datasets: [{
                    label: 'Saldo',
                    data: dataPoints,
                    borderColor: '#38bdf8',
                    backgroundColor: 'rgba(56, 189, 248, 0.1)',
                    fill: true,
                    tension: 0.3
                }]
            },
            options: { plugins: { legend: { display: false } } }
        });
    }

    checkAuth();
</script>
</body>
</html>
