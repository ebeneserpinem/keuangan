<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Finance Asset Dashboard Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --border: #334155; --primary: #38bdf8; --success: #22c55e; --danger: #ef4444; --text: #f8fafc; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; }
        .container { max-width: 1200px; margin: auto; }
        .card { background: var(--card); padding: 20px; border-radius: 12px; border: 1px solid var(--border); margin-bottom: 20px; }
        .grid3 { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 15px; }
        .grid-charts { display: grid; grid-template-columns: 1fr 2fr; gap: 20px; margin-bottom: 20px; }
        @media (max-width: 850px) { .grid-charts { grid-template-columns: 1fr; } }
        
        input, select { width: 100%; padding: 10px; margin: 8px 0; border-radius: 8px; border: 1px solid var(--border); background: #0f172a; color: white; box-sizing: border-box; }
        .big-val { font-size: 1.8em; font-weight: 800; margin-top: 5px; }
        .c-asset { color: var(--success); } .c-expense { color: var(--danger); } .c-net { color: var(--primary); }
        
        table { width: 100%; border-collapse: collapse; font-size: 14px; }
        th, td { padding: 12px; border-bottom: 1px solid var(--border); text-align: left; }
        th { background: rgba(255,255,255,0.05); }
        .nominal { text-align: right; font-family: monospace; font-weight: bold; }
        
        button { background: var(--primary); border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; color: white; font-weight: bold; transition: 0.2s; }
        button:hover { opacity: 0.8; }
        .btn-del { background: var(--danger); padding: 5px 10px; font-size: 11px; }
        
        #login-screen { position: fixed; inset: 0; background: var(--bg); display: flex; align-items: center; justify-content: center; z-index: 10000; }
        #pdf-template { display: none; background: white; color: black; padding: 40px; }
        
        .filter-container { display: flex; gap: 10px; align-items: center; margin-bottom: 15px; }
    </style>
</head>
<body>

<div id="login-screen">
    <div class="card" style="width: 300px; text-align: center;">
        <h3>Asset Manager</h3>
        <input type="password" id="passInput" placeholder="Password">
        <button onclick="login()" style="width: 100%; margin-top: 10px;">Login</button>
    </div>
</div>

<div id="main-content" class="container" style="display: none;">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 20px;">
        <h2 style="margin:0">Dashboard Keuangan</h2>
        <div>
            <button onclick="downloadPDF()" style="background:#64748b">Export PDF</button>
            <button onclick="logout()" style="background:var(--danger)">Logout</button>
        </div>
    </div>

    <div class="grid3">
        <div class="card">Total Aset (A+B)<div id="v-asset" class="big-val c-asset">Rp 0</div></div>
        <div class="card">Pengeluaran<div id="v-exp" class="big-val c-expense">Rp 0</div></div>
        <div class="card">Saldo Bersih<div id="v-net" class="big-val c-net">Rp 0</div></div>
    </div>

    <div class="card">
        <div class="grid3" style="align-items: end;">
            <div><label>Kategori</label>
                <select id="f-kat">
                    <option value="pemasukan">Pemasukan (Cash In)</option>
                    <option value="pengeluaran">Pengeluaran</option>
                    <option value="investasi">Investasi</option>
                    <option value="dana_darurat">Dana Darurat</option>
                </select>
            </div>
            <div><label>Deskripsi</label><input type="text" id="f-desc" placeholder="Keterangan transaksi"></div>
            <div><label>Nominal</label><input type="number" id="f-amt" placeholder="0"></div>
            <button onclick="simpan()" style="background:var(--success); width: 100%;">Simpan Transaksi</button>
        </div>
    </div>

    <div class="grid-charts">
        <div class="card">
            <h3 style="margin-top:0">Porsi Aset</h3>
            <canvas id="chartPie" style="max-height: 250px;"></canvas>
        </div>
        <div class="card">
            <h3 style="margin-top:0">Tren Saldo (Linear)</h3>
            <canvas id="chartLine" style="max-height: 250px;"></canvas>
        </div>
    </div>

    <div class="card">
        <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; margin-bottom: 15px;">
            <h3 style="margin:0">Riwayat Transaksi</h3>
            <div class="filter-container">
                <label>Bulan:</label>
                <select id="filterBulan" style="width: auto; margin:0;" onchange="loadTable()">
                    <option value="all">Semua Waktu</option>
                    <option value="0">Januari</option><option value="1">Februari</option><option value="2">Maret</option>
                    <option value="3">April</option><option value="4">Mei</option><option value="5">Juni</option>
                    <option value="6">Juli</option><option value="7">Agustus</option><option value="8">September</option>
                    <option value="9">Oktober</option><option value="10">November</option><option value="11">Desember</option>
                </select>
            </div>
        </div>
        <div style="overflow-x: auto;">
            <table>
                <thead>
                    <tr>
                        <th>Tanggal</th>
                        <th>Kategori</th>
                        <th>Deskripsi</th>
                        <th class="nominal">Nominal</th>
                        <th style="text-align:center">Aksi</th>
                    </tr>
                </thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>
    </div>
</div>

<div id="pdf-template">
    <h1 style="text-align:center; border-bottom: 2px solid #000;">LAPORAN ASET & KEUANGAN</h1>
    <div id="pdf-header" style="margin: 20px 0;"></div>
    <table style="width: 100%; border: 1px solid #000; border-collapse: collapse;">
        <thead><tr style="background:#eee"><th>Tanggal</th><th>Deskripsi</th><th>Kategori</th><th style="text-align:right">Nominal</th></tr></thead>
        <tbody id="pdf-table-body"></tbody>
    </table>
</div>

<script>
    const API = "https://finance-worker.ebeneserpinem6.workers.dev";
    let myPieChart, myLineChart, logoutTimer;

    function resetTimer() { clearTimeout(logoutTimer); logoutTimer = setTimeout(logout, 300000); }
    window.onmousemove = resetTimer; window.onkeydown = resetTimer;

    function login() {
        if(document.getElementById('passInput').value === "12345") {
            localStorage.setItem("session", "valid");
            checkAuth();
        } else { alert("Password Salah"); }
    }
    function logout() { localStorage.removeItem("session"); location.reload(); }
    
    function checkAuth() {
        if(localStorage.getItem("session")) {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('main-content').style.display = 'block';
            refresh();
        }
    }

    async function refresh() {
        const res = await fetch(API + "/api/data");
        const d = await res.json();
        
        document.getElementById("v-asset").innerText = "Rp " + d.totalAsset.toLocaleString('id-ID');
        document.getElementById("v-exp").innerText = "Rp " + d.pengeluaran.toLocaleString('id-ID');
        document.getElementById("v-net").innerText = "Rp " + d.saldoBersih.toLocaleString('id-ID');

        updatePieChart(d.investasi, d.dana_darurat);
        loadTable(); // Ini juga akan memicu update line chart
    }

    async function loadTable() {
        const res = await fetch(API + "/api/transaksi");
        let list = await res.json();
        const filterVal = document.getElementById('filterBulan').value;

        // Sorting by date (Terbaru di atas)
        list.sort((a, b) => new Date(b.tanggal) - new Date(a.tanggal));

        // Filter Bulanan
        if(filterVal !== "all") {
            list = list.filter(t => new Date(t.tanggal).getMonth() == filterVal);
        }

        document.getElementById("tableBody").innerHTML = list.map(t => `
            <tr>
                <td>${new Date(t.tanggal).toLocaleDateString('id-ID')}</td>
                <td><span style="font-size:11px; padding:2px 6px; border-radius:4px; background:rgba(255,255,255,0.1)">${t.kategori.toUpperCase()}</span></td>
                <td><b>${t.deskripsi}</b></td>
                <td class="nominal" style="color:${t.kategori === 'pengeluaran' ? 'var(--danger)' : 'var(--success)'}">
                    Rp ${Number(t.jumlah).toLocaleString('id-ID')}
                </td>
                <td style="text-align:center"><button class="btn-del" onclick="hapus('${t.id}')">Hapus</button></td>
            </tr>
        `).join("");

        updateLineChart(list);
    }

    async function simpan() {
        const desc = document.getElementById('f-desc').value;
        const amt = document.getElementById('f-amt').value;
        if(!desc || !amt) return alert("Isi semua data");

        const payload = {
            deskripsi: desc,
            jumlah: parseFloat(amt),
            kategori: document.getElementById('f-kat').value,
            email_id: "user@mail.com"
        };
        await fetch(API + "/api/tambah", { method: "POST", body: JSON.stringify(payload) });
        document.getElementById('f-desc').value = ""; document.getElementById('f-amt').value = "";
        refresh();
    }

    async function hapus(id) {
        if(confirm("Hapus transaksi ini?")) {
            await fetch(`${API}/api/hapus?id=${id}`, { method: "DELETE" });
            refresh();
        }
    }

    function updatePieChart(inv, darurat) {
        const ctx = document.getElementById('chartPie');
        if(myPieChart) myPieChart.destroy();
        myPieChart = new Chart(ctx, {
            type: 'pie',
            data: {
                labels: ['Investasi', 'Dana Darurat'],
                datasets: [{
                    data: [inv, darurat],
                    backgroundColor: ['#22c55e', '#38bdf8'],
                    borderWidth: 0
                }]
            },
            options: { 
                plugins: { 
                    legend: { position: 'bottom', labels: { color: 'white', font: { size: 10 } } } 
                } 
            }
        });
    }

    function updateLineChart(data) {
        const ctx = document.getElementById('chartLine');
        if(myLineChart) myLineChart.destroy();

        // Olah data untuk chart (Urutkan dari yang terlama untuk garis waktu)
        const sortedData = [...data].sort((a, b) => new Date(a.tanggal) - new Date(b.tanggal));
        
        // Kelompokkan per tanggal untuk melihat progres saldo
        const labels = sortedData.map(t => new Date(t.tanggal).toLocaleDateString('id-ID', {day:'2-digit', month:'short'}));
        let runningTotal = 0;
        const dataPoints = sortedData.map(t => {
            if(t.kategori === 'pengeluaran') runningTotal -= t.jumlah;
            else runningTotal += t.jumlah;
            return runningTotal;
        });

        myLineChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: labels,
                datasets: [{
                    label: 'Trend Saldo',
                    data: dataPoints,
                    borderColor: '#38bdf8',
                    backgroundColor: 'rgba(56, 189, 248, 0.1)',
                    fill: true,
                    tension: 0.3
                }]
            },
            options: {
                scales: {
                    y: { ticks: { color: '#94a3b8' }, grid: { color: '#334155' } },
                    x: { ticks: { color: '#94a3b8' }, grid: { display: false } }
                },
                plugins: { legend: { display: false } }
            }
        });
    }

    function downloadPDF() {
        const area = document.getElementById('pdf-template');
        const rows = Array.from(document.querySelectorAll("#tableBody tr")).map(tr => {
            const cells = tr.querySelectorAll("td");
            return `<tr>
                <td>${cells[0].innerText}</td>
                <td>${cells[2].innerText}</td>
                <td>${cells[1].innerText}</td>
                <td style="text-align:right">${cells[3].innerText}</td>
            </tr>`;
        }).join("");

        document.getElementById('pdf-table-body').innerHTML = rows;
        document.getElementById('pdf-header').innerHTML = `
            <p>Total Aset: <b>${document.getElementById('v-asset').innerText}</b></p>
            <p>Saldo Bersih: <b>${document.getElementById('v-net').innerText}</b></p>
            <p>Tanggal Cetak: ${new Date().toLocaleString('id-ID')}</p>
        `;
        area.style.display = 'block';
        html2pdf().from(area).set({ margin: 10, filename: 'Laporan_Keuangan.pdf', image: { type: 'jpeg', quality: 0.98 } }).save().then(() => area.style.display = 'none');
    }

    checkAuth();
</script>
</body>
</html>
