<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finance Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #0f172a; color: white; padding: 20px; max-width: 900px; margin: auto; }
        .card { background: #1e293b; padding: 20px; border-radius: 12px; margin-bottom: 20px; border: 1px solid #334155; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .val { color: #38bdf8; font-size: 2.5em; font-weight: bold; margin: 10px 0; text-align: center; }
        
        /* Form Style */
        input, select, button { width: 100%; padding: 10px; margin: 8px 0; border-radius: 6px; border: 1px solid #334155; background: #0f172a; color: white; box-sizing: border-box; }
        button { background: #38bdf8; color: #0f172a; font-weight: bold; border: none; cursor: pointer; transition: 0.3s; }
        button:hover { background: #7dd3fc; }
        
        /* Table Style */
        table { width: 100%; border-collapse: collapse; margin-top: 15px; font-size: 0.9em; }
        th, td { padding: 12px; border-bottom: 1px solid #334155; text-align: left; }
        th { background: #1e293b; }
        .btn-delete { background: #ef4444; color: white; padding: 5px 10px; font-size: 0.7em; width: auto; }

        @media (max-width: 600px) { .grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

    <h2 style="text-align: center;">💰 Personal Finance</h2>

    <div class="card">
        <h3>Saldo Net Saat Ini</h3>
        <div class="val" id="saldo-net">Rp 0</div>
    </div>

    <div class="grid">
        <!-- FORM TAMBAH MANUAL -->
        <div class="card">
            <h4>➕ Tambah Transaksi</h4>
            <form id="form-transaksi">
                <input type="date" id="tanggal" required>
                <input type="text" id="deskripsi" placeholder="Keterangan (Makan, Gaji, dll)" required>
                <input type="number" id="jumlah" placeholder="Jumlah (Contoh: 50000)" required>
                <select id="kategori">
                    <option value="saldo_net">Pemasukan (Masuk ke Saldo)</option>
                    <option value="pengeluaran">Pengeluaran</option>
                    <option value="investasi">Investasi</option>
                    <option value="dana_darurat">Dana Darurat</option>
                </select>
                <button type="submit" id="btn-simpan">Simpan Transaksi</button>
            </form>
        </div>

        <!-- CHART -->
        <div class="card">
            <h4>📊 Alokasi Dana</h4>
            <canvas id="chart"></canvas>
        </div>
    </div>

    <!-- TABEL RIWAYAT -->
    <div class="card">
        <h4>📝 Riwayat Transaksi</h4>
        <table id="table-riwayat">
            <thead>
                <tr>
                    <th>Tgl</th>
                    <th>Kategori</th>
                    <th>Deskripsi</th>
                    <th>Jumlah</th>
                    <th>Aksi</th>
                </tr>
            </thead>
            <tbody>
                <!-- Data akan muncul di sini -->
            </tbody>
        </table>
    </div>

    <script>
        // GANTI URL INI DENGAN URL WORKER ANDA
        const API_URL = "https://finance-worker.ebeneserpinem6.workers.dev";
        let myChart;

        // --- FUNGSI MENGAMBIL DATA ---
        async function refreshData() {
            try {
                // 1. Ambil data ringkasan
                const resData = await fetch(API_URL + "/api/data");
                const d = await resData.json();
                
                document.getElementById("saldo-net").innerText = "Rp " + d.saldo_net_display.toLocaleString('id-ID');

                // Update Chart
                const ctx = document.getElementById('chart').getContext('2d');
                if (myChart) myChart.destroy();
                myChart = new Chart(ctx, {
                    type: 'pie',
                    data: {
                        labels: ['Darurat', 'Investasi', 'Keluar'],
                        datasets: [{
                            data: [d.dana_darurat, d.investasi, d.pengeluaran],
                            backgroundColor: ['#facc15', '#22c55e', '#ef4444']
                        }]
                    },
                    options: { plugins: { legend: { labels: { color: 'white' } } } }
                });

                // 2. Ambil data transaksi (tabel)
                const resList = await fetch(API_URL + "/api/transaksi");
                const list = await resList.json();
                const tbody = document.querySelector("#table-riwayat tbody");
                tbody.innerHTML = "";

                list.forEach(t => {
                    const row = `<tr>
                        <td>${t.tanggal}</td>
                        <td>${t.kategori}</td>
                        <td>${t.deskripsi}</td>
                        <td>Rp ${t.jumlah.toLocaleString('id-ID')}</td>
                        <td><button class="btn-delete" onclick="hapusData(${t.id})">Hapus</button></td>
                    </tr>`;
                    tbody.innerHTML += row;
                });
            } catch (err) {
                console.error("Gagal load data:", err);
            }
        }

        // --- FUNGSI TAMBAH DATA ---
        document.getElementById("form-transaksi").addEventListener("submit", async (e) => {
            e.preventDefault();
            const btn = document.getElementById("btn-simpan");
            btn.innerText = "Menyimpan...";
            btn.disabled = true;

            const payload = {
                tanggal: document.getElementById("tanggal").value,
                deskripsi: document.getElementById("deskripsi").value,
                jumlah: parseInt(document.getElementById("jumlah").value),
                kategori: document.getElementById("kategori").value,
                email_id: "user@test.com", // Default
                no_rekening: "12345" // Default
            };

            try {
                await fetch(API_URL, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(payload)
                });
                document.getElementById("form-transaksi").reset();
                await refreshData(); // Refresh tampilan
            } catch (err) {
                alert("Gagal menyimpan data");
            } finally {
                btn.innerText = "Simpan Transaksi";
                btn.disabled = false;
            }
        });

        // --- FUNGSI HAPUS DATA ---
        async function hapusData(id) {
            if (confirm("Apakah Anda yakin ingin menghapus data ini?")) {
                try {
                    await fetch(`${API_URL}?id=${id}`, { method: "DELETE" });
                    await refreshData(); // Refresh tampilan
                } catch (err) {
                    alert("Gagal menghapus data");
                }
            }
        }

        // Load data pertama kali saat web dibuka
        refreshData();
    </script>
</body>
</html>
