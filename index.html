<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Sentinel Finance - Ultra Premium Edition</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <style>
        :root {
            --brand: #6366f1;
            --brand-light: #818cf8;
            --success: #10b981;
            --danger: #f43f5e;
            --bg: #0b0f1a;
            --card-bg: rgba(23, 28, 48, 0.7);
            --border: rgba(255, 255, 255, 0.08);
            --text-p: #f8fafc;
            --text-s: #94a3b8;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: var(--bg); 
            color: var(--text-p);
            min-height: 100vh;
            display: flex;
            overflow-x: hidden;
            background-image: radial-gradient(circle at 100% 0%, rgba(99, 102, 241, 0.15) 0%, transparent 40%);
        }

        /* --- ANIMASI --- */
        @keyframes slideInRight {
            from { opacity: 0; transform: translateX(30px); }
            to { opacity: 1; transform: translateX(0); }
        }
        .stagger-1 { animation: slideInRight 0.6s ease forwards; }
        .stagger-2 { animation: slideInRight 0.8s ease forwards; opacity: 0; }
        .stagger-3 { animation: slideInRight 1.0s ease forwards; opacity: 0; }

        /* --- SIDEBAR --- */
        nav {
            width: 280px;
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(20px);
            border-right: 1px solid var(--border);
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            gap: 30px;
            position: sticky;
            top: 0;
            height: 100vh;
        }
        @media (max-width: 1024px) { nav { display: none; } }

        .nav-item {
            padding: 14px 20px;
            border-radius: 12px;
            color: var(--text-s);
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            display: flex; align-items: center; gap: 12px;
        }
        .nav-item.active { background: var(--brand); color: white; box-shadow: 0 10px 20px rgba(99, 102, 241, 0.3); }

        /* --- CONTENT --- */
        main { flex: 1; padding: 40px; max-width: 1200px; margin: auto; width: 100%; }
        .header-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px; }

        /* --- CARDS --- */
        .card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 28px;
            padding: 30px;
            backdrop-filter: blur(10px);
            margin-bottom: 25px;
        }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; }
        .label { font-size: 13px; font-weight: 700; color: var(--text-s); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px; display: block; }
        .value { font-size: 2rem; font-weight: 800; font-family: 'Space Grotesk', sans-serif; }

        /* --- INPUTS --- */
        .quick-action { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px; }
        input, select {
            background: rgba(255,255,255,0.05); border: 1px solid var(--border);
            padding: 16px 20px; border-radius: 16px; color: white; font-weight: 500; width: 100%;
        }
        .btn-add { background: var(--brand); border: none; padding: 16px; border-radius: 16px; color: white; font-weight: 700; cursor: pointer; transition: 0.3s; }
        .btn-add:hover { filter: brightness(1.2); }
        .btn-add:disabled { opacity: 0.5; cursor: not-allowed; }

        /* --- TABLE --- */
        .table-wrap { width: 100%; overflow-x: auto; border-radius: 20px; }
        table { width: 100%; border-collapse: collapse; min-width: 600px; }
        th { background: rgba(255,255,255,0.03); padding: 20px; text-align: left; font-size: 12px; color: var(--text-s); }
        td { padding: 20px; border-bottom: 1px solid var(--border); font-size: 14px; }
        .type-pill { padding: 4px 10px; border-radius: 100px; font-size: 11px; font-weight: 800; }
        .pill-in { background: rgba(16, 185, 129, 0.1); color: var(--success); }
        .pill-out { background: rgba(244, 63, 94, 0.1); color: var(--danger); }

        #login-screen { position: fixed; inset: 0; background: var(--bg); z-index: 9999; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body>

<div id="login-screen">
    <div class="card" style="text-align: center; max-width: 400px; width: 90%;">
        <h2 style="margin-bottom: 10px;">Sentinel <span style="color:var(--brand)">Auth</span></h2>
        <input type="password" id="passInput" placeholder="••••" style="text-align: center; font-size: 24px; margin-bottom: 20px;">
        <button onclick="login()" class="btn-add" style="width: 100%;">ACCESS VAULT</button>
    </div>
</div>

<nav>
    <div style="font-size: 22px; font-weight: 800; padding: 0 20px;">Sentinel<span style="color:var(--brand)">.</span></div>
    <div style="margin-top: 20px;">
        <div class="nav-item active">🏠 Dashboard</div>
        <div class="nav-item">📈 Portofolio</div>
    </div>
</nav>

<main id="main-content" style="display: none;">
    <div class="header-row stagger-1">
        <div>
            <h1>Dashboard Aset</h1>
            <p style="color: var(--text-s);">Manajemen aset real-time terenkripsi.</p>
        </div>
        <div style="display: flex; gap: 10px;">
            <button onclick="downloadPDF()" class="btn-add" style="background: rgba(255,255,255,0.05); padding: 10px 20px;">PDF</button>
            <button onclick="logout()" class="btn-add" style="background: var(--danger); padding: 10px 20px;">Lock</button>
        </div>
    </div>

    <div class="stats-grid stagger-2">
        <div class="card"><span class="label">Total Aset</span><div id="v-asset" class="value" style="color: var(--success);">Rp 0</div></div>
        <div class="card"><span class="label">Pengeluaran</span><div id="v-exp" class="value" style="color: var(--danger);">Rp 0</div></div>
        <div class="card"><span class="label">Likuiditas</span><div id="v-net" class="value" style="color: var(--brand);">Rp 0</div></div>
    </div>

    <div class="stats-grid stagger-3">
        <div class="card" style="flex: 1.5;">
            <span class="label">Tren Saldo (Linear)</span>
            <div style="height: 200px;"><canvas id="lineChart"></canvas></div>
        </div>
        <div class="card" style="flex: 1;">
            <span class="label">Target Dana Darurat</span>
            <div style="height: 150px; position: relative;">
                <canvas id="gaugeChart"></canvas>
                <div id="perc-text" style="position: absolute; top: 60%; left: 50%; transform: translate(-50%, -50%); font-weight: 800; font-size: 1.5rem;">0%</div>
            </div>
        </div>
    </div>

    <div class="card stagger-3">
        <span class="label">Input Transaksi</span>
        <div class="quick-action">
            <select id="f-kat">
                <option value="pemasukan">PEMASUKAN</option>
                <option value="pengeluaran">PENGELUARAN</option>
                <option value="investasi">INVESTASI</option>
                <option value="dana_darurat">DANA DARURAT</option>
            </select>
            <input type="text" id="f-desc" placeholder="Keterangan">
            <input type="number" id="f-amt" placeholder="Nominal">
            <button id="btnSimpan" onclick="simpan()" class="btn-add">SIMPAN</button>
        </div>
    </div>

    <div class="card stagger-3" style="padding: 0;">
        <div style="padding: 25px 25px 0;"><span class="label">Riwayat Transaksi</span></div>
        <div class="table-wrap">
            <table>
                <thead>
                    <tr><th>TANGGAL</th><th>KATEGORI</th><th>DESKRIPSI</th><th style="text-align: right;">NOMINAL</th><th style="text-align: center;">AKSI</th></tr>
                </thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>
    </div>
</main>

<script>
    const API = "https://finance-worker.ebeneserpinem6.workers.dev";
    const TARGET_VAL = 20000000;
    let gaugeChart, lineChart;

    function login() {
        if(document.getElementById('passInput').value === "12345") {
            localStorage.setItem("vault_token", "active");
            checkAuth();
        } else { alert("Sandi salah."); }
    }
    function logout() { localStorage.removeItem("vault_token"); location.reload(); }
    function checkAuth() {
        if(localStorage.getItem("vault_token")) {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('main-content').style.display = 'block';
            refresh();
        }
    }

    async function refresh() {
        try {
            const res = await fetch(API + "/api/data");
            const d = await res.json();
            document.getElementById("v-asset").innerText = "Rp " + d.totalAsset.toLocaleString('id-ID');
            document.getElementById("v-exp").innerText = "Rp " + d.pengeluaran.toLocaleString('id-ID');
            document.getElementById("v-net").innerText = "Rp " + d.saldoBersih.toLocaleString('id-ID');
            updateGauge(d.dana_darurat);
            loadTable();
        } catch (e) { console.error("Refresh Error", e); }
    }

    async function loadTable() {
        const res = await fetch(API + "/api/transaksi");
        let list = await res.json();
        list.sort((a,b) => new Date(b.tanggal) - new Date(a.tanggal));

        document.getElementById("tableBody").innerHTML = list.slice(0, 10).map(t => `
            <tr>
                <td style="color: var(--text-s); font-family: 'Space Grotesk'">${new Date(t.tanggal).toLocaleDateString()}</td>
                <td><span class="type-pill pill-${t.kategori === 'pengeluaran' ? 'out' : 'in'}">${t.kategori.toUpperCase()}</span></td>
                <td style="font-weight: 700;">${t.deskripsi}</td>
                <td style="text-align: right; font-weight: 700; color: ${t.kategori === 'pengeluaran' ? 'var(--danger)' : 'var(--success)'}">
                    Rp ${t.jumlah.toLocaleString('id-ID')}
                </td>
                <td style="text-align: center;"><button onclick="hapus('${t.id}')" style="background:none; border:none; color:white; cursor:pointer;">✕</button></td>
            </tr>
        `).join("");
        updateLineChart(list);
    }

    // FUNGSI SIMPAN DIPERBAIKI
    async function simpan() {
        const desc = document.getElementById('f-desc').value;
        const amt = document.getElementById('f-amt').value;
        const kat = document.getElementById('f-kat').value;
        const btn = document.getElementById('btnSimpan');

        if(!desc || !amt) return alert("Isi deskripsi dan nominal!");

        btn.disabled = true;
        btn.innerText = "...";

        try {
            const response = await fetch(API + "/api/tambah", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    deskripsi: desc,
                    jumlah: parseFloat(amt),
                    kategori: kat,
                    email_id: "user@mail.com"
                })
            });

            if (response.ok) {
                document.getElementById('f-desc').value = "";
                document.getElementById('f-amt').value = "";
                refresh();
            } else {
                alert("Gagal simpan: Cek konsol browser.");
            }
        } catch (e) {
            console.error(e);
            alert("Kesalahan Jaringan");
        } finally {
            btn.disabled = false;
            btn.innerText = "SIMPAN";
        }
    }

    async function hapus(id) {
        if(confirm("Hapus data?")) {
            await fetch(`${API}/api/hapus?id=${id}`, { method: "DELETE" });
            refresh();
        }
    }

    function updateGauge(val) {
        const perc = Math.min(Math.round((val / TARGET_VAL) * 100), 100);
        document.getElementById('perc-text').innerText = perc + "%";
        const ctx = document.getElementById('gaugeChart');
        if(gaugeChart) gaugeChart.destroy();
        gaugeChart = new Chart(ctx, {
            type: 'doughnut',
            data: { datasets: [{ data: [val, Math.max(0, TARGET_VAL - val)], backgroundColor: ['#6366f1', 'rgba(255,255,255,0.05)'], borderWidth: 0, borderRadius: 10 }] },
            options: { cutout: '80%', plugins: { legend: { display: false } } }
        });
    }

    function updateLineChart(data) {
        const ctx = document.getElementById('lineChart');
        if(lineChart) lineChart.destroy();
        const sorted = [...data].sort((a,b) => new Date(a.tanggal) - new Date(b.tanggal));
        let bal = 0;
        const pts = sorted.map(t => { bal += (t.kategori === 'pengeluaran' ? -t.jumlah : t.jumlah); return bal; });

        lineChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: sorted.map(t => ""),
                datasets: [{ data: pts, borderColor: '#6366f1', borderWidth: 3, pointRadius: 0, tension: 0.4, fill: true, backgroundColor: 'rgba(99, 102, 241, 0.1)' }]
            },
            options: { maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { x: { display: false }, y: { display: false } } }
        });
    }

    function downloadPDF() {
        const element = document.getElementById('main-content');
        html2pdf().from(element).set({ margin: 5, filename: 'Sentinel_Aset.pdf', html2canvas: { scale: 2, backgroundColor: '#0b0f1a' } }).save();
    }

    checkAuth();
</script>
</body>
</html>
